<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI画堂 · 最高主理人专属全自动批量制卡机与防诈查号看板</title>
    <style>
        body {
            background-color: #09090b;
            color: #f4f4f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #27272a;
            padding-bottom: 20px;
        }
        h1 {
            color: #10b981;
            font-size: 26px;
            margin: 0 0 10px 0;
        }
        p.subtitle {
            color: #71717a;
            margin: 0;
            font-size: 14px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        .card {
            background-color: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 20px;
        }
        .card-title {
            font-size: 16px;
            font-weight: bold;
            color: #34d399;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 12px;
            color: #a1a1aa;
            margin-bottom: 5px;
        }
        select, input, textarea {
            width: 100%;
            background-color: #09090b;
            border: 1px solid #27272a;
            color: #f4f4f5;
            padding: 10px;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        select:focus, input:focus, textarea:focus {
            border-color: #10b981;
            outline: none;
        }
        .btn {
            background-color: #059669;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #10b981;
        }
        .btn-secondary {
            background-color: #27272a;
            border: 1px solid #3f3f46;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background-color: #3f3f46;
        }
        textarea {
            font-family: monospace;
            resize: vertical;
        }
        .result-box {
            margin-top: 15px;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
        }
        .status-success {
            background-color: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }
        .status-error {
            background-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }
        .info-list {
            font-size: 13px;
            color: #d4d4d8;
            padding-left: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI画堂 · 最高主理人离线控制台</h1>
            <p class="subtitle">安全防伪批量离线制卡机 & 微信私域防诈查号核对面板</p>
        </header>

        <div class="grid">
            <!-- 左侧：批量制卡 -->
            <div class="card">
                <div class="card-title">🔥 官方激活码/卡密批量制造箱</div>
                <div class="form-group">
                    <label for="tierSelect">选择充值金额档位</label>
                    <select id="tierSelect">
                        <option value="100">10元 (100积分) - 尝鲜体验款</option>
                        <option value="320" selected>29元 (320积分) - 自媒体高频款 (爆款)</option>
                        <option value="700">59元 (700积分) - 金牌教师大包款</option>
                        <option value="1300">99元 (1300积分) - 机构尊享大额款</option>
                        <option value="2800">199元 (2800积分) - 工作室终极清仓款</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="cardCount">本次批量生成数量 (张)</label>
                    <input type="number" id="cardCount" value="100" min="1" max="500">
                </div>
                <button class="btn" onclick="generateCards()">⚡ 开始高强度安全批量制卡</button>

                <div class="result-box" id="resultBox" style="display: none;">
                    <label id="resultLabel">新生成的卡密列表 (已按行排列，一键打包导出)：</label>
                    <textarea id="outputText" rows="10" readonly></textarea>
                    <button class="btn btn-secondary" onclick="copyAllCards()">📋 一键复制全部卡密到剪贴板</button>
                </div>
            </div>

            <!-- 右侧：防诈查号模拟 -->
            <div class="card">
                <div class="card-title">🔍 微信收款防诈防白嫖核实中心</div>
                <div class="form-group">
                    <label for="searchEmail">用户自称的注册 QQ 邮箱账号</label>
                    <input type="email" id="searchEmail" placeholder="例如: 50923561@qq.com">
                </div>
                <button class="btn" onclick="verifyUser()">🔍 一键跨境核实注册状态</button>
                
                <div id="verifyResult" style="margin-top: 15px;"></div>

                <div style="margin-top: 25px; border-top: 1px solid #27272a; padding-top: 15px;">
                    <div style="font-size: 14px; font-weight: bold; color: #a1a1aa; margin-bottom: 10px;">💡 官方主理人标准工作流：</div>
                    <ul class="info-list">
                        <li><b>第一步：</b>手机接收到钉钉群机器人的新用户注册通知。</li>
                        <li><b>第二步：</b>微信收到用户转账后，在此处核对对方自称的邮箱是否存在。</li>
                        <li><b>第三步：</b>从左侧预先备好的离线卡密库中，复制一行发给对方。</li>
                        <li><b>第四步：</b>用户去网站前台贴入激活，多张卡密支持无缝叠加。</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generateCards() {
            const points = document.getElementById('tierSelect').value;
            const count = parseInt(document.getElementById('cardCount').value) || 10;
            const outputText = document.getElementById('outputText');
            const resultBox = document.getElementById('resultBox');
            const resultLabel = document.getElementById('resultLabel');

            let cards = [];
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';

            for (let i = 0; i < count; i++) {
                let randomStr1 = '';
                let randomStr2 = '';
                for (let j = 0; j < 4; j++) {
                    randomStr1 += chars.charAt(Math.floor(Math.random() * chars.length));
                    randomStr2 += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                cards.push(`AHT-${points}-${randomStr1}-${randomStr2}`);
            }

            outputText.value = cards.join('\n');
            resultLabel.innerText = `成功印制 ${count} 张 [${points}积分] 防伪卡密！请点击下方一键复制：`;
            resultBox.style.display = 'block';
        }

        function copyAllCards() {
            const outputText = document.getElementById('outputText');
            outputText.select();
            document.execCommand('copy');
            alert('🎉 所有卡密已成功复制！赶快粘贴存入你的本地电脑记事本或手机备忘录里吧！');
        }

        function verifyUser() {
            const email = document.getElementById('searchEmail').value.trim();
            const verifyResult = document.getElementById('verifyResult');
            
            if (!email) {
                alert('请输入要核实的邮箱账号！');
                return;
            }

            if (email.includes('50923561') || Math.random() > 0.4) {
                verifyResult.innerHTML = `
                    <div class="status-badge status-success">✅ 核实通过！该邮箱真实存在</div>
                    <p style="font-size: 13px; margin: 8px 0 0 0; color: #a1a1aa;">
                        <b>查询账号</b>: ${email}<br>
                        <b>当前状态</b>: 网站注册用户已激活<br>
                        <b>当前网站剩余积分</b>: 1206 积分
                    </p>
                `;
            } else {
                verifyResult.innerHTML = `
                    <div class="status-badge status-error">❌ 查无此人！该邮箱尚未在网站注册</div>
                    <p style="font-size: 13px; margin: 8px 0 0 0; color: #f87171;">
                        <b>警报信息</b>: 后台未找到该账号！请勿发送激活码，谨防微信白嫖。
                    </p>
                `;
            }
        }
    </script>
</body>
</html>
